name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and deploy SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      # Build with the production API URL baked in (Vite inlines VITE_* at build time).
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://ez-handball-api.azurewebsites.net

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist        # pre-built output (we build above)
          skip_app_build: true
          skip_api_build: true
